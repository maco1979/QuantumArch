# QuantumArch CI/CD 流水线配置
# GitHub Actions 工作流

name: QuantumArch CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  PYTHON_VERSION: '3.10'
  CUDA_VERSION: '12.1'

jobs:
  # 1. 代码质量检查
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          echo "::group::Installing linting dependencies"
          pip install flake8 black isort pyright
          echo "::endgroup::"

      - name: Check code format (Black)
        run: black --check quantum_core/ optimization_system/ tests/ -v

      - name: Check import order (isort)
        run: isort --check-only --diff quantum_core/ optimization_system/ tests/ -v

      - name: Run pyright type checking
        run: |
          pyright --outputjson > pyright_report.json || true
          echo "Pyright report generated (even if errors exist)"
      
      - name: Upload pyright report
        uses: actions/upload-artifact@v4
        with:
          name: pyright-report
          path: pyright_report.json

  # 2. 单元测试
  test:
    name: Unit Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          echo "::group::Installing test dependencies"
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pytest pytest-cov pytest-xdist
          pip install -e .
          echo "::endgroup::"

      - name: Run tests with verbose output
        run: |
          echo "::group::Running pytest with coverage"
          pytest tests/ -v --tb=short --cov=quantum_core --cov-report=xml --cov-report=term
          echo "::endgroup::"
      
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # 3. 性能基准测试
  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[benchmark]')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          echo "::group::Installing benchmark dependencies"
          pip install torch --index-url https://download.pytorch.org/whl/cu121
          pip install -e .
          echo "::endgroup::"

      - name: Run benchmark
        run: |
          echo "::group::Running performance benchmarks"
          python run_benchmark.py --output benchmark_results.json
          echo "::endgroup::"
      
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark_results.json

  # 4. 安全扫描
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install bandit
        run: |
          echo "::group::Installing security tools"
          pip install bandit safety
          echo "::endgroup::"

      - name: Run security scan
        run: |
          echo "::group::Running Bandit security scan"
          bandit -r quantum_core/ -f json -o bandit_report.json || true
          echo "::endgroup::"
          echo "::group::Running Safety check"
          safety check --json > safety_report.json || true
          echo "::endgroup::"
      
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit_report.json
            safety_report.json

  # 5. 构建文档
  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (endsWith(github.ref, 'main'))
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          echo "::group::Installing MkDocs dependencies"
          pip install mkdocs mkdocstrings mkdocs-material
          echo "::endgroup::"

      - name: Build documentation
        run: |
          echo "::group::Building MkDocs documentation"
          mkdocs build -v
          echo "::endgroup::"
      
      - name: Deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  # 6. 构建发布包
  build:
    name: Build Package
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install build tools
        run: pip install build wheel
      
      - name: Build package
        run: python -m build
      
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # 7. 集成测试
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          echo "::group::Installing integration test dependencies"
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e .
          echo "::endgroup::"

      - name: Run integration tests
        run: |
          echo "::group::Running integration tests"
          pytest tests/test_full_suite.py::TestIntegration -v --tb=short
          echo "::endgroup::"

  # 8. CUDA 测试 (仅在有 GPU 时)
  cuda-test:
    name: CUDA Tests
    runs-on: linux-microgpu
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[cuda]')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install CUDA dependencies
        run: |
          echo "::group::Installing CUDA dependencies"
          pip install torch --index-url https://download.pytorch.org/whl/cu121
          pip install -e .
          echo "::endgroup::"

      - name: Run CUDA tests
        run: |
          echo "::group::Running CUDA-specific tests"
          pytest tests/ -v -m slow --cuda --tb=short || true
          echo "::endgroup::"

  # 汇总状态
  status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [lint, test, benchmark, security, docs, build, integration]
    if: always()

    steps:
      - name: Check job status
        run: |
          echo "::group::CI Job Status Summary"
          echo "Lint status: ${{ needs.lint.result }}"
          echo "Test status: ${{ needs.test.result }}"
          echo "Benchmark status: ${{ needs.benchmark.result }}"
          echo "Security status: ${{ needs.security.result }}"
          echo "Docs status: ${{ needs.docs.result }}"
          echo "Build status: ${{ needs.build.result }}"
          echo "Integration status: ${{ needs.integration.result }}"
          echo "::endgroup::"
          # 如果所有必需作业都成功，则退出成功
          if [[ "${{ needs.lint.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" || \
                "${{ needs.security.result }}" != "success" ]]; then
            echo "::error::Critical CI jobs failed"
            exit 1
          fi
          echo "All critical CI jobs passed"
