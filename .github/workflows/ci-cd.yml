# QuantumArch CI/CD 流水线配置
# GitHub Actions 工作流

name: QuantumArch CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  PYTHON_VERSION: '3.10'
  CUDA_VERSION: '12.1'

jobs:
  # 1. 代码质量检查
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install flake8 black isort pyright
      
      - name: Check code format (Black)
        run: black --check quantum_core/ optimization_system/ tests/
      
      - name: Check import order (isort)
        run: isort --check-only --diff quantum_core/ optimization_system/ tests/
      
      - name: Run pyright type checking
        run: pyright --outputjson > pyright_report.json || true
      
      - name: Upload pyright report
        uses: actions/upload-artifact@v4
        with:
          name: pyright-report
          path: pyright_report.json

  # 2. 单元测试
  test:
    name: Unit Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pytest pytest-cov pytest-xdist
          pip install -e .
      
      - name: Run tests
        run: |
          pytest tests/ -v --cov=quantum_core --cov-report=xml --cov-report=term
      
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # 3. 性能基准测试
  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[benchmark]')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cu121
          pip install -e .
      
      - name: Run benchmark
        run: python run_benchmark.py --output benchmark_results.json
      
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark_results.json

  # 4. 安全扫描
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install bandit
        run: pip install bandit safety
      
      - name: Run security scan
        run: |
          bandit -r quantum_core/ -f json -o bandit_report.json
          safety check --json > safety_report.json || true
      
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit_report.json
            safety_report.json

  # 5. 构建文档
  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (endsWith(github.ref, 'main'))
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install mkdocs mkdocstrings mkdocs-material
      
      - name: Build documentation
        run: mkdocs build
      
      - name: Deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  # 6. 构建发布包
  build:
    name: Build Package
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install build tools
        run: pip install build wheel
      
      - name: Build package
        run: python -m build
      
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # 7. 集成测试
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e .
      
      - name: Run integration tests
        run: |
          pytest tests/test_full_suite.py::TestIntegration -v

  # 8. CUDA 测试 (仅在有 GPU 时)
  cuda-test:
    name: CUDA Tests
    runs-on: linux-microgpu
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[cuda]')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install CUDA dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cu121
          pip install -e .
      
      - name: Run CUDA tests
        run: |
          pytest tests/ -v -m slow --cuda

  # 汇总状态
  status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [lint, test, benchmark, security, docs, build, integration]
    if: always()
    
    steps:
      - name: Check job status
        run: |
          echo "Jobs completed. Check individual job results above."
          exit 1
